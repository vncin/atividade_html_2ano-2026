<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Vinicius - Contato</title>
  </head>
  <body>
    <header class="cabecalho">
      <img class="img-perfil" src="satoru.jpg" alt="Perfil Satoru Gojo" />
      <nav class="menu">
        <a href="">Meu perfil</a>
        <a href="">Contato </a>
        <a href="">Portifólio</a>
        <a href="">Mensagem</a>
      </nav>
    </header>
    <main class="principal">
      <section class="principal-superior">
        <div class="principal-superior-esquerdo">
          <h1>PROFº VINICIUS DANTAS</h1>
          <p>Acesse meu perfil e conheça um pouco mais</p>
          <button class="botao-acesse">Acesse já!</button>
        </div>
        <img
          class="img-principal"
          src="satoru.jpg"
          alt="Imagem Parte Principal"
        />
      </section>
      <section class="principal-inferior">
        <hr class="linha" />
        <h2>Como posso te ajudar?</h2>
        <ol>
          <li>Insira um texto legal aqui!</li>
          <li>
            Outro exemplo de texto, porém um pouco mais longo que o anterior.
          </li>
          <li>Mais um exemplo, esse é o último.</li>
        </ol>
      </section>
    </main>
    <footer class="rodape">
      <p class="rodape-texto">VINICIUS DANTAS</p>
    </footer>
  </body>
</html>
